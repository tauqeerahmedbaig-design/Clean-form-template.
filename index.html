<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Form</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="wrapper">
        <div class="form">
            <form method="post">
                <div class="header">
                    <h1>Add Record</h1>
                </div>

                <input type="text" placeholder="Enter Your Name">
                <input type="email" placeholder="Enter Your Email">
                <input type="date">
                <div class="batman">
                <input type="submit" value="Add Record">
                </div>
            </form>
        </div>
    </div>

</body>
</html>
